name: KnowCars CD

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

# ─────────────────────────────────────────────────────────────────────────────
# PERMISSIONS
# ─────────────────────────────────────────────────────────────────────────────
permissions:
  id-token: write
  contents: read
  actions: read

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — VALIDATE KUBERNETES MANIFESTS
  # Runs kubeconform against all YAML manifests before anything 
  # ───────────────────────────────────────────────────────────────────────────
  validate-manifests:
    if: ${{ inputs.action == 'apply' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      # Before validating, substitute the ${DOCKERHUB_USERNAME} and ${SHORT_SHA}
      # placeholders with dummy values. kubeconform validates only the YAML structure
      - name: Validate Flask manifests
        env:
          DOCKERHUB_USERNAME: placeholder
          SHORT_SHA: placeholder
        run: |
          envsubst < flask_deployment/flask-deployment.yaml | kubeconform \
            -strict \
            -summary \
            -output pretty \
            -kubernetes-version 1.29.0 \
            -
          kubeconform \
            -strict \
            -summary \
            -output pretty \
            -kubernetes-version 1.29.0 \
            flask_deployment/flask-configMap.yaml \
            flask_deployment/flask-service.yaml \
            flask_deployment/flask-ingress.yaml

      - name: Validate MySQL manifests
        env:
          DOCKERHUB_USERNAME: placeholder
          SHORT_SHA: placeholder
        run: |
          envsubst < mysql_statefulset/mysql-statefulset.yaml | kubeconform \
            -strict \
            -summary \
            -output pretty \
            -kubernetes-version 1.29.0 \
            -
          kubeconform \
            -strict \
            -summary \
            -output pretty \
            -kubernetes-version 1.29.0 \
            mysql_statefulset/mysql-service.yaml

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — TERRAFORM
  # ───────────────────────────────────────────────────────────────────────────
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:      ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region:          ${{ secrets.AWS_REGION }}
          role-duration-seconds: 7200  # 2 hours — destroy can exceed the default 1-hour limit

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        if: ${{ inputs.action == 'apply' }}
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -auto-approve tfplan

      - name: Install kubectl (destroy only)
        if: ${{ inputs.action == 'destroy' }}
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl for EKS (destroy only)
        if: ${{ inputs.action == 'destroy' }}
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name   ${{ secrets.EKS_CLUSTER_NAME }} || true

      # The ALB created by the AWS Load Balancer Controller (via flask-ingress) is NOT
      # managed by Terraform. Deleting the namespace removes the Ingress and triggers
      # the LBC to deprovision the ALB. If we skip this, Terraform can't delete the
      # subnets or detach the IGW (DependencyViolation).
      - name: Delete Kubernetes namespace to deprovision ALB
        if: ${{ inputs.action == 'destroy' }}
        run: |
          kubectl delete namespace knowcars --ignore-not-found --timeout=120s || true

      - name: Wait for ALB to be fully deprovisioned
        if: ${{ inputs.action == 'destroy' }}
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --region ${{ secrets.AWS_REGION }} \
            --filters "Name=tag:Name,Values=knowcars-vpc" \
            --query 'Vpcs[0].VpcId' --output text)
          echo "VPC: $VPC_ID"
          for i in $(seq 1 20); do
            ALB_COUNT=$(aws elbv2 describe-load-balancers \
              --region ${{ secrets.AWS_REGION }} \
              --query "length(LoadBalancers[?VpcId=='${VPC_ID}'])" \
              --output text 2>/dev/null || echo "0")
            echo "Attempt $i/20 — ALB: $ALB_COUNT"
            if [ "$ALB_COUNT" = "0" ]; then
              echo "All load balancers removed, proceeding with destroy"
              break
            fi
            sleep 15
          done

      - name: Terraform Destroy
        if: ${{ inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 — DEPLOY TO EKS
  # ───────────────────────────────────────────────────────────────────────────
  deploy-eks:
    if: ${{ inputs.action == 'apply' }}
    needs: [validate-manifests, terraform]
    runs-on: ubuntu-latest
    outputs:
      nlb_dns: ${{ steps.nlb.outputs.dns }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl for EKS
        run: |
          aws sts get-caller-identity
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name   ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Install AWS Load Balancer Controller
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          LBC_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/knowcars-lbc-role"
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update eks
          helm upgrade --install aws-load-balancer-controller eks/aws-load-balancer-controller \
            --namespace kube-system \
            --set clusterName=${{ secrets.EKS_CLUSTER_NAME }} \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set "serviceAccount.annotations.eks\.amazonaws\.com/role-arn=${LBC_ROLE_ARN}" \
            --wait \
            --timeout 5m

      - name: Wait for LBC webhook to be ready
        run: |
          for i in $(seq 1 30); do
            EP_IP=$(kubectl get endpoints aws-load-balancer-webhook-service \
              -n kube-system \
              -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null || true)

            DESIRED=$(kubectl get deployment aws-load-balancer-controller \
              -n kube-system \
              -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
            READY=$(kubectl get deployment aws-load-balancer-controller \
              -n kube-system \
              -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")

            # caBundle is injected by the LBC cert-rotation controller after the
            # webhook TLS server finishes initializing. Without it the API server
            # cannot validate the webhook cert, so this is the definitive readiness signal.
            CA_LEN=$(kubectl get mutatingwebhookconfiguration aws-load-balancer-webhook \
              -o jsonpath='{.webhooks[0].clientConfig.caBundle}' 2>/dev/null | wc -c || echo "0")

            echo "Attempt $i/30 — endpoint IP: ${EP_IP:-none}  pods ready: ${READY:-0}/${DESIRED:-0}  caBundle bytes: ${CA_LEN}"

            if [ -n "$EP_IP" ] && [ "$DESIRED" != "0" ] && [ "$READY" = "$DESIRED" ] && [ "$CA_LEN" -gt 10 ]; then
              echo "All $READY/$DESIRED LBC pods ready, endpoint IP $EP_IP, caBundle populated (${CA_LEN} bytes) — LBC webhook is ready"
              break
            fi

            sleep 10
            if [ "$i" = "30" ]; then
              echo "ERROR: LBC webhook did not become ready in time"
              exit 1
            fi
          done

      - name: Create namespace if not exists
        run: |
          kubectl get namespace knowcars || kubectl create namespace knowcars

      - name: Create/update mysql-secret
        run: |
          kubectl create secret generic mysql-secret \
            --namespace knowcars \
            --from-literal=MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
            --from-literal=MYSQL_USER=${{ secrets.MYSQL_USER }} \
            --from-literal=MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create/update flask-secret
        run: |
          kubectl create secret generic flask-secret \
            --namespace knowcars \
            --from-literal=API_KEY=${{ secrets.API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # Get the SHORT_SHA from the last successful CI run
      - name: Get latest successful CI run ID
        id: ci_run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID=$(gh run list \
            --workflow CI.yaml \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Download SHORT_SHA artifact from CI
        uses: actions/download-artifact@v4
        with:
          name: short-sha
          run-id: ${{ steps.ci_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read SHORT_SHA
        id: sha
        run: echo "SHORT_SHA=$(cat short_sha.txt)" >> $GITHUB_OUTPUT

      # envsubst replaces ${DOCKERHUB_USERNAME} and ${SHORT_SHA} placeholders
      # inside the YAML files with their real values at deploy time.
      - name: Apply StorageClass
        run: |
          kubectl apply -f mysql_statefulset/ebs-storage-class.yaml

      - name: Apply MySQL manifests
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          SHORT_SHA: ${{ steps.sha.outputs.SHORT_SHA }}
        run: |
          kubectl apply -f mysql_statefulset/mysql-service.yaml
          envsubst < mysql_statefulset/mysql-statefulset.yaml | kubectl apply -f -

      # Wait for MySQL to be fully ready before deploying Flask.
      - name: Wait for MySQL rollout
        run: |
          kubectl rollout status statefulset/mysql-statefulset \
            --namespace knowcars \
            --timeout=180s

      - name: Apply Flask manifests
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          SHORT_SHA: ${{ steps.sha.outputs.SHORT_SHA }}
        run: |
          kubectl apply -f flask_deployment/flask-configMap.yaml
          kubectl apply -f flask_deployment/flask-service.yaml
          kubectl apply -f flask_deployment/flask-ingress.yaml
          envsubst < flask_deployment/flask-deployment.yaml | kubectl apply -f -

      - name: Wait for Flask rollout
        run: |
          kubectl rollout status deployment/flask-deployment \
            --namespace knowcars \
            --timeout=180s

      - name: Get ALB DNS name
        id: alb
        run: |
          for i in $(seq 1 20); do
            DNS=$(kubectl get ingress flask-ingress \
              --namespace knowcars \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
            if [ -n "$DNS" ]; then
              echo "ALB DNS: $DNS"
              echo "dns=$DNS" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Waiting for ALB hostname... attempt $i/20"
            sleep 15
          done
          echo "Timed out waiting for ALB hostname"
          exit 1

      - name: Smoke test — API returns cars with images
        env:
          DNS: ${{ steps.alb.outputs.dns }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          echo "=== ALB diagnostics ==="
          echo "DNS: $DNS"
          aws elbv2 describe-load-balancers \
            --region ${{ secrets.AWS_REGION }} \
            --query "LoadBalancers[?DNSName=='${DNS}'].{Scheme:Scheme,State:State,VpcId:VpcId}" \
            --output json

          echo ""
          echo "=== Smoke test ==="
          for i in $(seq 1 10); do
            HTTP_CODE=$(curl -s -o /tmp/smoke_body.txt -w "%{http_code}" \
              --max-time 10 \
              -H "X-API-Key: ${API_KEY}" \
              "http://${DNS}/api/cars?include=image" || true)
            CURL_EXIT=$?
            echo "Attempt $i/10 — curl exit=$CURL_EXIT HTTP=$HTTP_CODE"
            if [ "$CURL_EXIT" != "0" ]; then
              echo "  curl error $CURL_EXIT (52=empty reply, 28=timeout, 7=refused)"
            fi
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Smoke test passed"
              exit 0
            fi
            sleep 10
          done
          echo "Smoke test failed"
          exit 1

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 — BUILD & DEPLOY REACT FRONTEND TO S3
  # ───────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    if: ${{ inputs.action == 'apply' }}
    needs: deploy-eks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name   ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Get ALB DNS from flask-ingress
        id: alb
        run: |
          DNS=$(kubectl get ingress flask-ingress \
            --namespace knowcars \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "ALB DNS: $DNS"
          if [ -z "$DNS" ]; then
            echo "ERROR: flask-ingress has no external hostname"
            exit 1
          fi
          echo "dns=$DNS" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend_react/package-lock.json'

      - name: Install dependencies
        run: cd frontend_react && npm ci

      - name: Build React app
        run: cd frontend_react && npm run build
        env:
          REACT_APP_API_URL: http://${{ steps.alb.outputs.dns }}
          REACT_APP_API_KEY: ${{ secrets.API_KEY }}

      - name: Upload build to S3
        run: |
          aws s3 sync frontend_react/build/ s3://${{ secrets.S3_FRONTEND_BUCKET }} \
            --delete \
            --region ${{ secrets.AWS_REGION }}

  # ───────────────────────────────────────────────────────────────────────────
