apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-statefulset
  namespace: knowcars
  labels:
    app: mysql
spec:
  # replicas: 1 — one stable pod with one persistent EBS volume.
  replicas: 1

  serviceName: mysql-service

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          # Image tag is injected at deploy time by envsubst in the CD workflow. or locally by an .env file
          image: ${DOCKERHUB_USERNAME}/knowcars-mysql:${SHORT_SHA}
          imagePullPolicy: Always
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -u$MYSQL_USER -p$MYSQL_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "mysqladmin ping -u$MYSQL_USER -p$MYSQL_PASSWORD"
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql

  
  volumeClaimTemplates:
    - metadata:
        name: mysql-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: gp2-csi
        resources:
          requests:
            storage: 1Gi
